<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runner Horizontal Infinito</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #dff3ff;
      --bg2: #9fd3ff;
      --ground: #3f7d3b;
      --ground-dark: #2d5d2a;
      --player: #ff6b6b;
      --player-dark: #d94d4d;
      --obstacle: #444;
      --obstacle-top: #666;
      --text: #1b1b1b;
      --panel: rgba(255,255,255,0.86);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
      overflow: hidden;
    }

    .wrap {
      width: min(1000px, 96vw);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: var(--panel);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      user-select: none;
    }

    .hud strong {
      font-size: 1rem;
    }

    .hint {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.16);
      background: linear-gradient(180deg, #dff3ff 0%, #aee0ff 65%, #8fd0ff 100%);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <strong id="score">Puntos: 0</strong>
      <div class="hint">Espacio / ↑ / clic para saltar · R para reiniciar</div>
      <strong id="speed">Velocidad: 1.0x</strong>
    </div>
    <canvas id="game" width="1000" height="420"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const speedEl = document.getElementById('speed');

    const world = {
      width: canvas.width,
      height: canvas.height,
      groundY: 335,
      gravity: 0.78,
      baseSpeed: 6,
      speed: 6,
      maxSpeed: 16,
      distance: 0,
      score: 0,
      gameOver: false,
      started: true,
      time: 0,
      spawnTimer: 0,
      nextSpawnIn: 90,
    };

    const player = {
      x: 130,
      y: 0,
      w: 42,
      h: 58,
      vy: 0,
      jumpForce: -14.5,
      grounded: true,
      color: '#ff6b6b',
      legPhase: 0,
    };

    player.y = world.groundY - player.h;

    let obstacles = [];
    let clouds = createClouds();
    let dust = [];
    let groundMarks = createGroundMarks();

    function createClouds() {
      const items = [];
      for (let i = 0; i < 7; i++) {
        items.push({
          x: Math.random() * world.width,
          y: 40 + Math.random() * 120,
          w: 60 + Math.random() * 90,
          h: 20 + Math.random() * 18,
          speedFactor: 0.2 + Math.random() * 0.35,
        });
      }
      return items;
    }

    function createGroundMarks() {
      const items = [];
      let x = 0;
      while (x < world.width + 200) {
        const w = 25 + Math.random() * 35;
        items.push({ x, w });
        x += 45 + Math.random() * 55;
      }
      return items;
    }

    function resetGame() {
      world.speed = world.baseSpeed;
      world.distance = 0;
      world.score = 0;
      world.gameOver = false;
      world.time = 0;
      world.spawnTimer = 0;
      world.nextSpawnIn = 75 + Math.random() * 35;

      player.y = world.groundY - player.h;
      player.vy = 0;
      player.grounded = true;
      player.legPhase = 0;

      obstacles = [];
      dust = [];
      groundMarks = createGroundMarks();
      updateHud();
    }

    function jump() {
      if (world.gameOver) {
        resetGame();
        return;
      }
      if (player.grounded) {
        player.vy = player.jumpForce;
        player.grounded = false;
        for (let i = 0; i < 7; i++) {
          dust.push({
            x: player.x + player.w * 0.4,
            y: world.groundY - 4,
            vx: -2 - Math.random() * 3,
            vy: -1 - Math.random() * 2,
            life: 24 + Math.random() * 10,
            size: 3 + Math.random() * 3,
          });
        }
      }
    }

    function spawnObstacle() {
      const typeRoll = Math.random();
      let h, w;

      if (typeRoll < 0.55) {
        w = 24 + Math.random() * 18;
        h = 38 + Math.random() * 36;
      } else if (typeRoll < 0.85) {
        w = 42 + Math.random() * 30;
        h = 28 + Math.random() * 28;
      } else {
        w = 18 + Math.random() * 12;
        h = 70 + Math.random() * 34;
      }

      obstacles.push({
        x: world.width + 30,
        y: world.groundY - h,
        w,
        h,
        counted: false,
      });

      const speedFactor = Math.min((world.speed - world.baseSpeed) * 3.5, 55);
      world.nextSpawnIn = 55 + Math.random() * 55 - speedFactor;
      world.nextSpawnIn = Math.max(34, world.nextSpawnIn);
      world.spawnTimer = 0;
    }

    function updateHud() {
      scoreEl.textContent = `Puntos: ${world.score}`;
      speedEl.textContent = `Velocidad: ${(world.speed / world.baseSpeed).toFixed(1)}x`;
    }

    function rectsCollide(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function update() {
      world.time++;
      if (world.gameOver) return;

      world.distance += world.speed;
      world.score = Math.floor(world.distance / 12);
      world.speed = Math.min(world.maxSpeed, world.baseSpeed + world.score / 180);
      updateHud();

      player.vy += world.gravity;
      player.y += player.vy;

      if (player.y >= world.groundY - player.h) {
        player.y = world.groundY - player.h;
        player.vy = 0;
        player.grounded = true;
      }

      if (player.grounded) {
        player.legPhase += 0.23 + world.speed * 0.02;
      }

      for (const cloud of clouds) {
        cloud.x -= world.speed * cloud.speedFactor;
        if (cloud.x + cloud.w < 0) {
          cloud.x = world.width + Math.random() * 180;
          cloud.y = 35 + Math.random() * 130;
        }
      }

      for (const mark of groundMarks) {
        mark.x -= world.speed;
      }
      const lastMark = groundMarks[groundMarks.length - 1];
      if (lastMark && lastMark.x < world.width) {
        groundMarks.push({
          x: lastMark.x + 50 + Math.random() * 65,
          w: 20 + Math.random() * 40,
        });
      }
      groundMarks = groundMarks.filter(m => m.x + m.w > -10);

      world.spawnTimer++;
      if (world.spawnTimer >= world.nextSpawnIn) {
        spawnObstacle();
      }

      for (const obs of obstacles) {
        obs.x -= world.speed;
        if (!obs.counted && obs.x + obs.w < player.x) {
          obs.counted = true;
        }
        if (rectsCollide(player, obs)) {
          world.gameOver = true;
        }
      }
      obstacles = obstacles.filter(obs => obs.x + obs.w > -20);

      for (const p of dust) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life -= 1;
      }
      dust = dust.filter(p => p.life > 0);
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, world.height);
      sky.addColorStop(0, '#dff3ff');
      sky.addColorStop(0.7, '#a8ddff');
      sky.addColorStop(1, '#89ceff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      for (const cloud of clouds) {
        drawCloud(cloud.x, cloud.y, cloud.w, cloud.h);
      }

      ctx.fillStyle = '#8ac56d';
      ctx.fillRect(0, world.groundY - 18, world.width, 18);

      ctx.fillStyle = '#3f7d3b';
      ctx.fillRect(0, world.groundY, world.width, world.height - world.groundY);

      ctx.fillStyle = '#2d5d2a';
      ctx.fillRect(0, world.groundY + 16, world.width, 6);

      ctx.fillStyle = '#7c5a3b';
      for (const mark of groundMarks) {
        ctx.fillRect(mark.x, world.groundY + 7, mark.w, 4);
      }
    }

    function drawCloud(x, y, w, h) {
      ctx.beginPath();
      ctx.ellipse(x, y, w * 0.22, h * 0.7, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.24, y - h * 0.18, w * 0.2, h * 0.8, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.48, y, w * 0.24, h * 0.76, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.72, y + h * 0.05, w * 0.18, h * 0.58, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPlayer() {
      const x = player.x;
      const y = player.y;
      const run = Math.sin(player.legPhase);

      ctx.save();

      ctx.fillStyle = '#d94d4d';
      ctx.fillRect(x + 7, y + 10, player.w - 14, player.h - 14);

      ctx.fillStyle = '#ff6b6b';
      ctx.fillRect(x + 4, y + 6, player.w - 12, player.h - 16);

      ctx.fillStyle = '#222';
      ctx.fillRect(x + 26, y + 18, 5, 5);

      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 30, y + 42, 8, 4);

      ctx.strokeStyle = '#222';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';

      const leg1 = player.grounded ? run * 9 : -6;
      const leg2 = player.grounded ? -run * 9 : 10;

      ctx.beginPath();
      ctx.moveTo(x + 14, y + player.h - 8);
      ctx.lineTo(x + 10, y + player.h + leg1);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x + 28, y + player.h - 8);
      ctx.lineTo(x + 33, y + player.h + leg2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x + 6, y + 22);
      ctx.lineTo(x - 5, y + 24 + (player.grounded ? -run * 4 : 2));
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x + player.w - 6, y + 22);
      ctx.lineTo(x + player.w + 8, y + 24 + (player.grounded ? run * 4 : -2));
      ctx.stroke();

      ctx.restore();
    }

    function drawObstacles() {
      for (const obs of obstacles) {
        ctx.fillStyle = '#444';
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

        ctx.fillStyle = '#666';
        ctx.fillRect(obs.x, obs.y, obs.w, 6);

        if (obs.h > 60) {
          ctx.fillStyle = '#5a8f3d';
          ctx.fillRect(obs.x - 4, obs.y + 8, obs.w + 8, 8);
          ctx.fillRect(obs.x - 2, obs.y + 22, obs.w + 4, 7);
        }
      }
    }

    function drawDust() {
      for (const p of dust) {
        ctx.globalAlpha = Math.max(0, p.life / 30);
        ctx.fillStyle = '#8b6d4f';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawOverlay() {
      if (!world.gameOver) return;

      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fillRect(world.width / 2 - 210, world.height / 2 - 70, 420, 140);

      ctx.fillStyle = '#111';
      ctx.textAlign = 'center';
      ctx.font = 'bold 38px Arial';
      ctx.fillText('Fin de la partida', world.width / 2, world.height / 2 - 14);

      ctx.font = '24px Arial';
      ctx.fillText(`Puntuación: ${world.score}`, world.width / 2, world.height / 2 + 24);

      ctx.font = '18px Arial';
      ctx.fillText('Presiona R, Espacio, ↑ o clic para reiniciar', world.width / 2, world.height / 2 + 54);
    }

    function render() {
      ctx.clearRect(0, 0, world.width, world.height);
      drawBackground();
      drawDust();
      drawObstacles();
      drawPlayer();
      drawOverlay();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    function handleActionKey(e) {
      const key = e.key.toLowerCase();
      if (key === ' ' || key === 'arrowup' || key === 'w') {
        e.preventDefault();
        jump();
      } else if (key === 'r') {
        resetGame();
      }
    }

    window.addEventListener('keydown', handleActionKey);
    canvas.addEventListener('mousedown', jump);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    updateHud();
    loop();
  </script>
</body>
</html>
