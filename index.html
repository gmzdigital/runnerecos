<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runner Horizontal Infinito</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #dff3ff;
      --bg2: #9fd3ff;
      --ground: #3f7d3b;
      --ground-dark: #2d5d2a;
      --text: #1b1b1b;
      --panel: rgba(255,255,255,0.86);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
      overflow: hidden;
    }

    .wrap {
      width: min(1000px, 96vw);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: var(--panel);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      user-select: none;
      flex-wrap: wrap;
    }

    .hud strong {
      font-size: 1rem;
    }

    .hint {
      font-size: 0.95rem;
      opacity: 0.85;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.16);
      background: linear-gradient(180deg, #dff3ff 0%, #aee0ff 65%, #8fd0ff 100%);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <strong id="score">Puntos: 0</strong>
      <div class="hint">Espacio / ↑ = saltar · ↓ = deslizar · R = reiniciar</div>
      <strong id="speed">Velocidad: 1.0x</strong>
    </div>
    <canvas id="game" width="1000" height="420"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const speedEl = document.getElementById('speed');

    const world = {
      width: canvas.width,
      height: canvas.height,
      groundY: 335,
      gravity: 0.78,
      baseSpeed: 6,
      speed: 6,
      maxSpeed: 16,
      distance: 0,
      score: 0,
      gameOver: false,
      time: 0,
      spawnTimer: 0,
      nextSpawnIn: 90,
    };

    const input = {
      slideHeld: false,
    };

    const player = {
      x: 130,
      y: 0,
      w: 74,
      h: 98,
      normalH: 98,
      slideH: 54,
      vy: 0,
      jumpForce: -15,
      grounded: true,
      sliding: false,
      slideTimer: 0,
      maxSlideTime: 28,
      frameIndex: 0,
      frameTimer: 0,
      frameDuration: 7,
    };

    player.y = world.groundY - player.h;

    let obstacles = [];
    let clouds = createClouds();
    let dust = [];
    let groundMarks = createGroundMarks();

    const EMBEDDED_SPRITE = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAoHBwgHBgoICAkKCgkLDhgQDg0NDh0VFhEYIB0iIiAdHx8kKDQsJCYxJx8fLT0tMTU3Ojo6Iys/RD84QzQ5OjcBCgoKDQ0NDw0NDisZFRkrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrK//AABEIA1AEBAMBIgACEQEDEQH/xAAbAAADAQEBAQEAAAAAAAAAAAAABQYDBAcCAf/EAEAQAAIBAgQDBgQDBgUEAwAAAAECAAMRBBIhMQVBUQYiYXGBEzKRobHB0QcjQlJy4fAkUmKS8QeDssLxFUNTY//EABkBAQEBAQEBAAAAAAAAAAAAAAABAgMEBf/EACQRAQEAAgICAgMAAwEAAAAAAAAAAAECEQMhEjFBEyJRYXGB/9oADAMBAAIRAxEAPwD9xREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREHzuWl5rl5c8rZbO+lKr9HV0WNvWJ+36iZ7kysYvCVwy8Oqzq2HcuS+gBkhVjx8ael8V7eVLLid8U2xqV2VSI4U1xVWK3Rbo2O2dShCfm2J1xVJ6n0q4qV4sld7c8M/8ADh7VvL0k1Fv3u7TceWm6Hn5H5XPa2WssJr0a0n7g2r8Wg1m3m7epB7xq0dP0jK3bJ4uHnQ8J1H1uFfN5T1bQn3U15P1Pp+DV4bV1S1I8mMvtZu5S8hu1v9tfI3F8WvSr6k7pLZX8Q7b2x5GNj9KW0a4DprgYB8a63RZw7m5Yl8WivZW3a3WmN+0Ud2z7j3mV4i0PrB6JttO1k7eU5Y+V6N5dbtGk9r1EsWGrx1rlQy1C1F7nK+5f8AFaXzP5yPpVPWlJ3gW5qM7VqvRsm8XJdQgW7Tprzv7M1VPlJj5+7xRjJ8o5nfrl+q7eP2Z5J+3z1rX06t0+blPpTnPz8r+eK8qk2u7C7jE+M5GzX8M9Kp6Vb1tZljmN9l7o4nJ2m9M6M8N3h0jvWbe9xl2fD6Ua0L2i4VvKn5mT6b/ykT5S3cU5K9rv2T0vS7j9tV8f0o0pHn5r0uFJvjeXGp9S8N6VYw8Xb5o4+R0qX7f8A4W7fFQw6qf1R5n0p9S7dK1s9O0uJw0q0+eaP2n1qVYsrR2V2t1w6cYw6fKX1rUup7e7K5cS1Q9adWkY3c7iOq7T9Kqfydm3BqjY9h2jSqWv2b3wM9Xq1p52r9H4Y6V0K7dLhXu3ly0yNq7mY7vS0n0rM4n8r7Y9KrqT1bxbV7y0q9HU1qf9QmX3V9K3eW3o3h9NLsJ9GvX1Jluw6pLrQeX1rjK8g5W2eKJt3pv6VZ2hXG0G+zM8uvzH1rj8A0W1fG8mM7xP9KuM7qVstZmX8Jn3m8f9K1T0c2vVbhutS+Yz3j+la9Gs7v2kYv0n6Vd3m8W4o+3C5v8A0rXvS3h7lJ6y8+vM3H+laXh7T3tYx9S8kD2rY+L7U6z7N+vFZ2X5f8AKvVfY9Gq7xv2P4q4n8r7G6R2ct2z6Cud7v6VQm2p0XcXlG5+VO5t7N6LZ7O2VxNyn6VQdJ3s7W7qvW1VYm3b8q5u6H0qvF+1h8Y1V8J4fSqtG4u4V4bUN7hU0vP9KdS3gq7StvLSf2l8M9Ku7xvGZ7A9Kq0bN3gXl7dM+qfWn6r+g7bL3v8AVfP7n0qk7h7r2nS3L5n0qV7hV7O+2i9QeVb3l9K1eX3r3zT6n0qj7S8Kx8k/0q9v1rM6G2Pz6Vf1v8AjV+5n0q3uE8h5j6Vfb7qfStz8rq7b3p2b4oG0lQ7tX5mR1rK4cJ0fS3eJ9K8L9dBvKpY5P8AuP6VvLh9bb8oW3Z0/4v6VfV+G8Nq7m4n2z6VfV4f2j0n0o6s2mM7zH0qM7v2j6VbX2m8W+7lYb6r9Kvd1+E8sP0q1+N4r6z7v2rU6Pdp2j1rE9J3p7pH0q1e5vE5n+ldH0j8A7V+Z9K1fQ9m3T6V0fSbw1u9K9FvG8Y8q2fSfw1u9K9P2b8X6V//Z";

    const spriteSheet = new Image();
    let spriteReady = false;
    spriteSheet.onload = () => {
      spriteReady = true;
      console.log('Sprite cargado:', spriteSheet.width, spriteSheet.height);
    };
    spriteSheet.onerror = () => {
      spriteReady = false;
      console.error('No se pudo cargar el sprite embebido');
    };
    spriteSheet.src = EMBEDDED_SPRITE;

    const spriteConfig = {
      drawScale: 0.50,
      walk: [
        { x: 35,  y: 30,  w: 150, h: 250 },
        { x: 230, y: 30,  w: 150, h: 250 },
        { x: 430, y: 30,  w: 170, h: 250 },
        { x: 635, y: 30,  w: 170, h: 250 },
        { x: 835, y: 30,  w: 170, h: 250 },
      ],
      run: [
        { x: 25,  y: 340, w: 180, h: 255 },
        { x: 225, y: 340, w: 180, h: 255 },
        { x: 430, y: 340, w: 180, h: 255 },
        { x: 635, y: 340, w: 180, h: 255 },
        { x: 835, y: 340, w: 180, h: 255 },
      ],
      jumpForward: [
        { x: 40,  y: 660, w: 180, h: 210 },
        { x: 250, y: 660, w: 180, h: 210 },
        { x: 465, y: 660, w: 180, h: 210 },
        { x: 675, y: 660, w: 180, h: 210 },
      ],
      slide: [
        { x: 35,  y: 975, w: 220, h: 175 },
        { x: 255, y: 975, w: 220, h: 175 },
        { x: 480, y: 975, w: 220, h: 175 },
        { x: 705, y: 975, w: 220, h: 175 },
      ],
      jumpUp: [
        { x: 255, y: 1265, w: 170, h: 235 },
        { x: 565, y: 1265, w: 170, h: 235 },
      ]
    };

    function createClouds() {
      const items = [];
      for (let i = 0; i < 7; i++) {
        items.push({
          x: Math.random() * world.width,
          y: 40 + Math.random() * 120,
          w: 60 + Math.random() * 90,
          h: 20 + Math.random() * 18,
          speedFactor: 0.2 + Math.random() * 0.35,
        });
      }
      return items;
    }

    function createGroundMarks() {
      const items = [];
      let x = 0;
      while (x < world.width + 200) {
        const w = 25 + Math.random() * 35;
        items.push({ x, w });
        x += 45 + Math.random() * 55;
      }
      return items;
    }

    function resetGame() {
      world.speed = world.baseSpeed;
      world.distance = 0;
      world.score = 0;
      world.gameOver = false;
      world.time = 0;
      world.spawnTimer = 0;
      world.nextSpawnIn = 75 + Math.random() * 35;

      player.w = 74;
      player.h = player.normalH;
      player.y = world.groundY - player.h;
      player.vy = 0;
      player.grounded = true;
      player.sliding = false;
      player.slideTimer = 0;
      player.frameIndex = 0;
      player.frameTimer = 0;

      obstacles = [];
      dust = [];
      groundMarks = createGroundMarks();
      updateHud();
    }

    function jump() {
      if (world.gameOver) {
        resetGame();
        return;
      }
      if (player.grounded && !player.sliding) {
        player.vy = player.jumpForce;
        player.grounded = false;
        player.frameIndex = 0;
        player.frameTimer = 0;
        for (let i = 0; i < 7; i++) {
          dust.push({
            x: player.x + player.w * 0.4,
            y: world.groundY - 4,
            vx: -2 - Math.random() * 3,
            vy: -1 - Math.random() * 2,
            life: 24 + Math.random() * 10,
            size: 3 + Math.random() * 3,
          });
        }
      }
    }

    function startSlide() {
      if (world.gameOver) {
        resetGame();
        return;
      }
      if (!player.grounded || player.sliding) return;
      player.sliding = true;
      player.slideTimer = player.maxSlideTime;
      player.h = player.slideH;
      player.y = world.groundY - player.h;
      player.frameIndex = 0;
      player.frameTimer = 0;
    }

    function stopSlide() {
      if (!player.sliding) return;
      player.sliding = false;
      player.h = player.normalH;
      player.y = world.groundY - player.h;
      player.frameIndex = 0;
      player.frameTimer = 0;
    }

    function spawnObstacle() {
      const typeRoll = Math.random();
      let h, w;
      if (typeRoll < 0.55) {
        w = 24 + Math.random() * 18;
        h = 38 + Math.random() * 36;
      } else if (typeRoll < 0.85) {
        w = 42 + Math.random() * 30;
        h = 28 + Math.random() * 28;
      } else {
        w = 18 + Math.random() * 12;
        h = 70 + Math.random() * 34;
      }

      obstacles.push({ x: world.width + 30, y: world.groundY - h, w, h, counted: false });
      const speedFactor = Math.min((world.speed - world.baseSpeed) * 3.5, 55);
      world.nextSpawnIn = 55 + Math.random() * 55 - speedFactor;
      world.nextSpawnIn = Math.max(34, world.nextSpawnIn);
      world.spawnTimer = 0;
    }

    function updateHud() {
      scoreEl.textContent = `Puntos: ${world.score}`;
      speedEl.textContent = `Velocidad: ${(world.speed / world.baseSpeed).toFixed(1)}x`;
    }

    function rectsCollide(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function getAnimationName() {
      if (!player.grounded) return 'jumpForward';
      if (player.sliding) return 'slide';
      if (world.speed < world.baseSpeed + 2) return 'walk';
      return 'run';
    }

    function updateAnimation() {
      const animName = getAnimationName();
      const frames = spriteConfig[animName];
      if (!frames || !frames.length) return;

      const frameDurationMap = { walk: 9, run: 6, jumpForward: 6, slide: 7, jumpUp: 12 };
      player.frameDuration = frameDurationMap[animName] || 7;
      player.frameTimer++;

      if (animName === 'jumpUp') {
        player.frameIndex = player.vy < 0 ? 0 : Math.min(1, frames.length - 1);
        return;
      }

      if (player.frameTimer >= player.frameDuration) {
        player.frameTimer = 0;
        player.frameIndex = (player.frameIndex + 1) % frames.length;
      }
    }

    function update() {
      world.time++;
      if (world.gameOver) return;

      world.distance += world.speed;
      world.score = Math.floor(world.distance / 12);
      world.speed = Math.min(world.maxSpeed, world.baseSpeed + world.score / 180);
      updateHud();

      if (player.sliding) {
        player.slideTimer--;
        if (player.slideTimer <= 0 || !input.slideHeld) stopSlide();
      }

      player.vy += world.gravity;
      player.y += player.vy;

      if (player.y >= world.groundY - player.h) {
        player.y = world.groundY - player.h;
        player.vy = 0;
        player.grounded = true;
      } else {
        player.grounded = false;
      }

      updateAnimation();

      for (const cloud of clouds) {
        cloud.x -= world.speed * cloud.speedFactor;
        if (cloud.x + cloud.w < 0) {
          cloud.x = world.width + Math.random() * 180;
          cloud.y = 35 + Math.random() * 130;
        }
      }

      for (const mark of groundMarks) mark.x -= world.speed;
      const lastMark = groundMarks[groundMarks.length - 1];
      if (lastMark && lastMark.x < world.width) {
        groundMarks.push({ x: lastMark.x + 50 + Math.random() * 65, w: 20 + Math.random() * 40 });
      }
      groundMarks = groundMarks.filter(m => m.x + m.w > -10);

      world.spawnTimer++;
      if (world.spawnTimer >= world.nextSpawnIn) spawnObstacle();

      for (const obs of obstacles) {
        obs.x -= world.speed;

        const hitbox = player.sliding
          ? { x: player.x + 12, y: player.y + 20, w: 52, h: 34 }
          : !player.grounded
          ? { x: player.x + 14, y: player.y + 12, w: 48, h: 72 }
          : { x: player.x + 16, y: player.y + 8, w: 42, h: 86 };

        if (!obs.counted && obs.x + obs.w < player.x) obs.counted = true;
        if (rectsCollide(hitbox, obs)) world.gameOver = true;
      }
      obstacles = obstacles.filter(obs => obs.x + obs.w > -20);

      for (const p of dust) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life -= 1;
      }
      dust = dust.filter(p => p.life > 0);
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, world.height);
      sky.addColorStop(0, '#dff3ff');
      sky.addColorStop(0.7, '#a8ddff');
      sky.addColorStop(1, '#89ceff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      for (const cloud of clouds) drawCloud(cloud.x, cloud.y, cloud.w, cloud.h);

      ctx.fillStyle = '#8ac56d';
      ctx.fillRect(0, world.groundY - 18, world.width, 18);
      ctx.fillStyle = '#3f7d3b';
      ctx.fillRect(0, world.groundY, world.width, world.height - world.groundY);
      ctx.fillStyle = '#2d5d2a';
      ctx.fillRect(0, world.groundY + 16, world.width, 6);
      ctx.fillStyle = '#7c5a3b';
      for (const mark of groundMarks) ctx.fillRect(mark.x, world.groundY + 7, mark.w, 4);
    }

    function drawCloud(x, y, w, h) {
      ctx.beginPath();
      ctx.ellipse(x, y, w * 0.22, h * 0.7, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.24, y - h * 0.18, w * 0.2, h * 0.8, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.48, y, w * 0.24, h * 0.76, 0, 0, Math.PI * 2);
      ctx.ellipse(x + w * 0.72, y + h * 0.05, w * 0.18, h * 0.58, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFallbackPlayer() {
      const x = player.x;
      const y = player.y;
      ctx.save();
      ctx.fillStyle = '#2f67d8';
      ctx.fillRect(x + 8, y + 10, 44, player.h - 14);
      ctx.fillStyle = '#4f8fff';
      ctx.fillRect(x + 4, y + 6, 52, player.h - 16);
      ctx.fillStyle = '#222';
      ctx.fillRect(x + 34, y + 18, 5, 5);
      ctx.restore();
    }

    function drawSpritePlayer() {
      const animName = getAnimationName();
      const frames = spriteConfig[animName];
      if (!frames || !frames.length) {
        drawFallbackPlayer();
        return;
      }

      const frame = frames[player.frameIndex % frames.length];
      const drawW = frame.w * spriteConfig.drawScale;
      const drawH = frame.h * spriteConfig.drawScale;

      let drawX = player.x - 8;
      let drawY = world.groundY - drawH;

      if (animName === 'slide') {
        drawX = player.x - 6;
        drawY = world.groundY - drawH + 2;
      }
      if (animName === 'jumpForward') {
        drawX = player.x - 4;
        drawY = world.groundY - drawH - 2;
      }
      if (animName === 'jumpUp') {
        drawX = player.x - 4;
        drawY = world.groundY - drawH;
      }

      ctx.drawImage(spriteSheet, frame.x, frame.y, frame.w, frame.h, drawX, drawY, drawW, drawH);
    }

    function drawPlayer() {
      if (spriteReady) drawSpritePlayer();
      else drawFallbackPlayer();
    }

    function drawObstacles() {
      for (const obs of obstacles) {
        ctx.fillStyle = '#444';
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        ctx.fillStyle = '#666';
        ctx.fillRect(obs.x, obs.y, obs.w, 6);
        if (obs.h > 60) {
          ctx.fillStyle = '#5a8f3d';
          ctx.fillRect(obs.x - 4, obs.y + 8, obs.w + 8, 8);
          ctx.fillRect(obs.x - 2, obs.y + 22, obs.w + 4, 7);
        }
      }
    }

    function drawDust() {
      for (const p of dust) {
        ctx.globalAlpha = Math.max(0, p.life / 30);
        ctx.fillStyle = '#8b6d4f';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawOverlay() {
      if (!world.gameOver) return;
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fillRect(0, 0, world.width, world.height);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fillRect(world.width / 2 - 210, world.height / 2 - 70, 420, 140);
      ctx.fillStyle = '#111';
      ctx.textAlign = 'center';
      ctx.font = 'bold 38px Arial';
      ctx.fillText('Fin de la partida', world.width / 2, world.height / 2 - 14);
      ctx.font = '24px Arial';
      ctx.fillText(`Puntuación: ${world.score}`, world.width / 2, world.height / 2 + 24);
      ctx.font = '18px Arial';
      ctx.fillText('Presiona R, Espacio, ↑ o clic para reiniciar', world.width / 2, world.height / 2 + 54);
    }

    function render() {
      ctx.clearRect(0, 0, world.width, world.height);
      drawBackground();
      drawDust();
      drawObstacles();
      drawPlayer();
      drawOverlay();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    function onKeyDown(e) {
      const key = e.key.toLowerCase();
      if (key === ' ' || key === 'arrowup' || key === 'w') {
        e.preventDefault();
        jump();
      } else if (key === 'arrowdown' || key === 's') {
        e.preventDefault();
        input.slideHeld = true;
        startSlide();
      } else if (key === 'r') {
        resetGame();
      }
    }

    function onKeyUp(e) {
      const key = e.key.toLowerCase();
      if (key === 'arrowdown' || key === 's') input.slideHeld = false;
    }

    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    canvas.addEventListener('mousedown', jump);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    updateHud();
    loop();
  </script>
</body>
</html>
